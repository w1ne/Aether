name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev protobuf-compiler libusb-1.0-0-dev libudev-dev
      - name: Build
        run: |
          cargo build --release --workspace --exclude aether-demo-fw
      - name: Install Packaging Tools
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm
      - name: Build DEB
        run: cargo deb --package aether-ui --no-build
      - name: Build RPM
        run: cargo generate-rpm --package aether-ui
      - name: Rename for Release
        run: mv target/release/aether-ui target/release/aether-linux-x64
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aether-linux-packages
          path: |
            target/release/aether-linux-x64
            target/debian/*.deb
            target/generate-rpm/*.rpm

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc, i686-pc-windows-msvc]
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Protoc
        run: choco install protoc
      - name: Build
        run: cargo build --release --workspace --exclude aether-demo-fw --target ${{ matrix.target }}
      - name: Prepare Artifact
        shell: pwsh
        run: |
          $arch = if ("${{ matrix.target }}" -like "*i686*") { "x86" } else { "x64" }
          Move-Item target/${{ matrix.target }}/release/aether-ui.exe target/release/aether-windows-$arch.exe
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-windows-${{ matrix.target }}
          path: target/release/aether-windows-*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin
      - name: Install Protoc
        run: brew install protobuf
      - name: Build
        run: |
          cargo build --release --workspace --exclude aether-demo-fw --target x86_64-apple-darwin
          cargo build --release --workspace --exclude aether-demo-fw --target aarch64-apple-darwin
      - name: Prepare Universal Binary
        run: |
          mkdir -p target/release
          lipo -create target/x86_64-apple-darwin/release/aether-ui target/aarch64-apple-darwin/release/aether-ui -output target/release/aether-macos-universal
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-macos
          path: target/release/aether-macos-universal

  build-flatpak:
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-23.08
    steps:
      - uses: actions/checkout@v3
      - name: Build Flatpak
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak-builder --user --disable-rofiles-fuse --install-deps-from=flathub --repo=repo --force-clean build io.github.w1ne.Aether.yaml
          flatpak build-bundle repo aether.flatpak io.github.w1ne.Aether
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-flatpak
          path: aether.flatpak


  create-release:
    needs: [build-linux, build-windows, build-macos, build-flatpak]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            aether-linux-x64
            aether-windows-x64.exe
            aether-windows-x86.exe
            aether-macos-universal
            *.deb
            *.rpm
            *.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
