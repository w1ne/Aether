name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev protobuf-compiler libusb-1.0-0-dev libudev-dev
      - name: Build
        run: cargo build --release --workspace --exclude aether-demo-fw
      - name: Prepare Artifact
        run: mv target/release/aether-ui target/release/aether-linux-x64
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-linux
          path: target/release/aether-linux-x64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Protoc
        run: choco install protoc
      - name: Build
        run: cargo build --release --workspace --exclude aether-demo-fw
      - name: Prepare Artifact
        shell: pwsh
        run: Move-Item target/release/aether-ui.exe target/release/aether-windows-x64.exe
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-windows
          path: target/release/aether-windows-x64.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Protoc
        run: brew install protobuf
      - name: Build
        run: cargo build --release --workspace --exclude aether-demo-fw
      - name: Prepare Artifact
        run: mv target/release/aether-ui target/release/aether-macos-x64
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-macos
          path: target/release/aether-macos-x64


  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios
      - name: Install Protoc
        run: brew install protobuf
      - name: Build Static Library
        run: cargo build --release --package aether-ui --target aarch64-apple-ios --no-default-features
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-ios-lib
          path: target/aarch64-apple-ios/release/libaether_ui.a

  create-release:
    needs: [build-linux, build-windows, build-macos, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            aether-linux-x64
            aether-windows-x64.exe
            aether-macos-x64
            libaether_ui.a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
